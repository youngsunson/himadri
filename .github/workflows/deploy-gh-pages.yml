name: Build and deploy to GitHub Pages

# trigger on pushes to main (adjust if you prefer other triggers)
on:
  push:
    branches:
      - main

# Give the GITHUB_TOKEN the rights needed to push
permissions:
  contents: write   # needed for actions that push to repo (git push)
  pages: write      # needed for Pages API interactions
  id-token: write   # optional, safe to include for some auth flows

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (use npm ci if lockfile present)
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "Lockfile found — running npm ci"
            npm ci --prefer-offline --no-audit --no-fund
          else
            echo "No lockfile — running npm install"
            npm install --no-audit --no-fund
          fi

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
